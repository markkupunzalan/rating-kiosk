<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password — Feedback Kiosk</title>
  
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="login.css">
  <style>
    .back-link {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        color: rgba(255, 255, 255, 0.7);
        text-decoration: none;
        font-size: 0.9rem;
        margin-top: 1.5rem;
        transition: color 0.2s;
    }
    .back-link:hover {
        color: white;
    }
    .success-msg {
        background: rgba(46, 213, 115, 0.1);
        border-left: 3px solid #2ed573;
        color: #2ed573;
        padding: 1rem;
        border-radius: 4px;
        margin-bottom: 1.5rem;
        font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <div class="login-container fade-in">
    <div class="login-header">
      <div class="logo-wrap">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
        </svg>
      </div>
      <h1>Password Recovery</h1>
      <p>Enter your email to receive a reset link</p>
    </div>

    <!-- Error container -->
    <div id="error-message" class="error-msg" style="display: none;"></div>
    <!-- Success container -->
    <div id="success-message" class="success-msg" style="display: none;"></div>

    <form id="forgot-password-form">
      <div class="form-group">
        <label for="email">Admin Email Address</label>
        <input type="email" id="email" name="email" class="form-input" placeholder="admin@example.com" required>
      </div>

      <button type="submit" class="btn-primary" id="submit-btn" style="margin-top: 1rem;">
        <span class="btn-text">Send Reset Link</span>
        <span class="loader" style="display: none;"></span>
      </button>

      <div style="text-align: center;">
        <a href="login.html" class="back-link">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
          Back to Login
        </a>
      </div>
    </form>
  </div>

  <script src="forgot-password.js"></script>
</body>
</html>
