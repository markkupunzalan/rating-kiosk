<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password — Feedback Kiosk</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="login.css">
  <style>
    .success-msg {
        background: rgba(46, 213, 115, 0.1);
        border-left: 3px solid #2ed573;
        color: #2ed573;
        padding: 1rem;
        border-radius: 4px;
        margin-bottom: 1.5rem;
        font-size: 0.9rem;
    }
    .back-link {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        color: rgba(255, 255, 255, 0.7);
        text-decoration: none;
        font-size: 0.9rem;
        margin-top: 1.5rem;
        transition: color 0.2s;
    }
  </style>
</head>
<body>
  <div class="login-container fade-in">
    <div class="login-header">
      <div class="logo-wrap">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
        </svg>
      </div>
      <h1>Set New Password</h1>
      <p>Please enter your new administrator password</p>
    </div>

    <!-- Error container -->
    <div id="error-message" class="error-msg" style="display: none;"></div>
    <!-- Success container -->
    <div id="success-message" class="success-msg" style="display: none;"></div>

    <form id="reset-password-form">
      <input type="hidden" id="token" name="token" value="">

      <div class="form-group">
        <label for="password">New Password</label>
        <input type="password" id="password" name="password" class="form-input" placeholder="Min. 8 characters" required minlength="8">
      </div>
      
      <div class="form-group">
        <label for="confirm-password">Confirm Password</label>
        <input type="password" id="confirm-password" name="confirm-password" class="form-input" placeholder="Repeat new password" required minlength="8">
      </div>

      <button type="submit" class="btn-primary" id="submit-btn" style="margin-top: 1rem;">
        <span class="btn-text">Reset Password</span>
        <span class="loader" style="display: none;"></span>
      </button>

      <div style="text-align: center;">
        <a href="login.html" class="back-link" style="display:none;" id="login-link">
          Return to Login
        </a>
      </div>
    </form>
  </div>

  <script src="reset-password.js"></script>
</body>
</html>
