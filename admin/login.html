<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login — Feedback Kiosk</title>
  
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="login.css">
</head>
<body>
  <div class="login-container fade-in">
    <div class="login-header">
      <div class="logo-wrap">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
        </svg>
      </div>
      <h1>Admin Console</h1>
      <p>Log in to manage kiosk feedback</p>
    </div>

    <!-- Error container -->
    <div id="error-message" class="error-msg" style="display: none;"></div>

    <form id="login-form">
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" class="form-input" placeholder="Enter your username" required>
      </div>
      
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" class="form-input" placeholder="Enter your password" required>
      </div>

      <div class="form-options" style="display: flex; justify-content: space-between; align-items: center;">
        <label class="checkbox-wrap">
          <input type="checkbox" id="rememberMe" name="rememberMe">
          <span class="checkbox-box"></span>
          Remember me for 30 days
        </label>
        <a href="forgot-password.html" class="forgot-password-link" style="font-size: 0.9rem; color: var(--primary); text-decoration: none;">Forgot Password?</a>
      </div>

      <button type="submit" class="btn-primary" id="login-btn">
        <span class="btn-text">Sign In</span>
        <span class="loader" style="display: none;"></span>
      </button>
    </form>
  </div>

  <script src="login.js"></script>
</body>
</html>
